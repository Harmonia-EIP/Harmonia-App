name: Build & Deploy Harmonia

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Harmonia-VST3
          path: build/HarmoniaPlugin_artefacts/Release/VST3/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Harmonia-VST3
          path: release/vst3

      - name: Check files
        run: ls -R release/vst3

      - name: Create ZIP
        run: |
          cd release/vst3
          zip -r ../../HarmoniaPlugin.vst3.zip HarmoniaPlugin.vst3

      - name: Upload ZIP (temp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "HarmoniaPlugin.vst3.zip"
          target: "/var/www/harmonia-downloads/HarmoniaPlugin.vst3.zip.tmp"

      - name: Replace ZIP atomically
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mv /var/www/harmonia-downloads/HarmoniaPlugin.vst3.zip.tmp \
               /var/www/harmonia-downloads/HarmoniaPlugin.vst3.zip