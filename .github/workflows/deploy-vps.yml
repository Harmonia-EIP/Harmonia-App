name: Deploy VST3 to VPS (main)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Download VST3 artifact from latest build
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Build Windows and Test Standalone/VST3 (JUCE)
          name: Harmonia-VST3
          path: release/vst3

      - name: Upload VST3 to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "release/vst3/HarmoniaPlugin.vst3"
          target: /var/www/harmonia-downloads/release